name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run python -m unittest discover -s tests

      - name: Byte-compile app
        run: uv run python -m compileall app.py main.py tests