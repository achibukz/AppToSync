<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot password — Job Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
      .auth-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .auth-card {
        width: 100%;
        max-width: 400px;
        padding: 36px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: var(--shadow);
        animation: fade-up 0.4s ease both;
      }
      .auth-card .eyebrow { margin-bottom: 6px; }
      .auth-card h1 { font-size: 1.6rem; margin-bottom: 16px; }
      .auth-footer { margin-top: 24px; text-align: center; font-size: 0.88rem; color: var(--muted); }
      .auth-footer a { color: var(--secondary); font-weight: 600; text-decoration: none; }
      .auth-footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="backdrop-grid" aria-hidden="true"></div>
    <div class="auth-shell">
      <div class="auth-card">
        <p class="eyebrow">Job Tracker</p>
        <h1>Forgot password?</h1>
        <p class="lede">Password resets are handled manually. Contact the admin at <strong>akibukzwork@gmail.com</strong> and they'll reset it for you.</p>
        <div class="auth-footer">
          <a href="{{ url_for('login_route') }}">← Back to sign in</a>
        </div>
      </div>
    </div>
  </body>
</html>
